name: Pinterest Automation Engine

on:
  # 1. The Manual "Start Key"
  workflow_dispatch: 
  
  # 2. The Autopilot Schedule (Runs automatically EVERY HOUR)
  schedule:
    - cron: '0 * * * *'
permissions:
  contents: write # Allows the bot to save memory files

jobs:
  run-god-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Install Graphic Design & Bot Software
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 Fire the God Bot
      env:
        SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        AMAZON_TRACKING_ID: ${{ secrets.AMAZON_TRACKING_ID }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        PYTHONUNBUFFERED: 1   # <--- ADD THIS LINE EXACTLY LIKE THIS
        # 🔥 Give the dummy script access to the phantom brain
        PHANTOM_PINTEREST_CODE: ${{ secrets.PHANTOM_PINTEREST_CODE }}
      run: python pinterest_bot.py

    - name: 💾 Save Memory & Queue (Auto-Commit)
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add products_queue.csv posted_memory.txt title_memory.txt || true
        git commit -m "Automated memory update" || echo "No changes to commit"
        git push
