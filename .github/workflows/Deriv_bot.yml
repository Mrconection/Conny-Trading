name: Deriv Sniper Cloud Engine 🎯

on:
  schedule:
    # Restarts the server every 5 hours (00:00, 05:00, 10:00, etc.)
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  execute-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Access Command Center Repository
      uses: actions/checkout@v4

    - name: Boot Linux Server & Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Trading Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install websockets pandas pandas-ta python-dotenv requests

    - name: Execute Deriv WebSocket Bot
      env:
        # This securely injects your hidden keys into the server
        DERIV_API_TOKEN: ${{ secrets.DERIV_API_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 🔥 Give the dummy script access to the phantom brain
        PHANTOM_BOT_CODE: ${{ secrets.PHANTOM_BOT_CODE }}
      run: python Deriv_bot.py
