name: 5-Minute News Desk

on:
  schedule:
    - cron: '*/5 * * * *' # Polling every 5 minutes
  workflow_dispatch:

jobs:
  news-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Gives the bot permission to save the memory file to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install requests feedparser groq google-api-python-client google-auth-httplib2 google-auth-oauthlib beautifulsoup4
        
      - name: Run News Desk
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_TOKEN_BASE64: ${{ secrets.BLOGGER_TOKEN_BASE64 }}
          PHANTOM_NEWS_CODE: ${{ secrets.PHANTOM_NEWS_CODE }}
        run: python news_desk.py
        
      - name: Save History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted_news_urls.txt || true
          git add used_images.txt || true
          git commit -m "🤖 System: Update URL and Image Memory Vaults" || true
          git push
