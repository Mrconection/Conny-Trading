name: Recover Secret
on: push
jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Write secret to a file
        env:
          # Make sure this matches your actual secret name
          SECRET_DATA: ${{ secrets.PHANTOM_PINTEREST_CODE }}
        run: |
          echo "$SECRET_DATA" > recovered_bot.py

      - name: Upload code as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: rescued-pinterest-code
          path: recovered_bot.py
